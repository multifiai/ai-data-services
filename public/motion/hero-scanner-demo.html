<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hero Image2 Asset</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #020404;
      }

      body {
        display: grid;
        place-items: center;
      }

      .stage {
        position: relative;
        width: min(100vw, 1600px);
        aspect-ratio: 16 / 9;
        overflow: hidden;
        background: #020404;
      }

      img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
      }
    </style>
  </head>
  <body>
    <div class="stage" aria-hidden="true">
      <img src="/assets/generated-no-text/hero-workbench-bg.png" alt="" />
    </div>
  </body>
</html>
